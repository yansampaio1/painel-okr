<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OKR / KPI – Escola de Gestão 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-principal: #2C1E4D;
            --cor-secundaria: #F3951E;
            --cor-destaque: #E52C42;
            --cor-fundo: #f8f8f8;
            --cor-card: #ffffff;
            --cor-texto: #333333;
            --cor-sombra: rgba(0, 0, 0, 0.08);
            --cor-borda: #e0e0e0;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            min-height: 100vh;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .topo img { height: 50px; }
        .voltar {
            text-decoration: none;
            color: var(--cor-principal);
            font-weight: 700;
        }
        .header-center {
            text-align: center;
            margin-bottom: 40px;
        }
        .header-center h1 {
            color: var(--cor-principal);
            font-size: 2.2em;
            margin-bottom: 8px;
            position: relative;
            padding-bottom: 16px;
        }
        .header-center h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background-color: var(--cor-secundaria);
            border-radius: 2px;
        }
        .secao-titulo {
            color: var(--cor-principal);
            border-left: 5px solid var(--cor-secundaria);
            padding-left: 15px;
            margin: 36px 0 16px 0;
            font-size: 1.5em;
        }
        /* Login */
        #login-container {
            max-width: 380px;
            margin: 60px auto;
            background: var(--cor-card);
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 6px 20px var(--cor-sombra);
            border-left: 6px solid var(--cor-secundaria);
        }
        #login-container h2 {
            color: var(--cor-principal);
            margin-top: 0;
            margin-bottom: 24px;
        }
        #login-container label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--cor-texto);
        }
        #login-container input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 16px;
            border: 1px solid var(--cor-borda);
            border-radius: 8px;
            font-size: 1em;
        }
        #login-container button {
            width: 100%;
            padding: 12px;
            background: var(--cor-principal);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
        }
        #login-container button:hover { opacity: 0.9; }
        #login-erro {
            color: var(--cor-destaque);
            margin-bottom: 12px;
            font-size: 0.95em;
            display: none;
        }
        /* Visualização geral (somente leitura) */
        #visualizacao-header { margin-bottom: 24px; }
        #visualizacao-header .btn-entrar-atualizar {
            padding: 10px 20px;
            background: var(--cor-principal);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1em;
            margin-top: 16px;
        }
        #visualizacao-header .btn-entrar-atualizar:hover { opacity: 0.9; }
        #visualizacao-header .btn-atualizar-dados {
            padding: 10px 20px;
            background: transparent;
            color: var(--cor-principal);
            border: 1px solid var(--cor-principal);
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1em;
        }
        #visualizacao-header .btn-atualizar-dados:hover { background: rgba(44, 30, 77, 0.08); }
        /* Dashboard */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        .user-info {
            color: var(--cor-principal);
            font-weight: 500;
        }
        .btn-sair {
            padding: 8px 16px;
            background: transparent;
            color: var(--cor-destaque);
            border: 1px solid var(--cor-destaque);
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.95em;
        }
        .btn-sair:hover { background: rgba(229, 44, 66, 0.08); }
        .objetivo-bloco { margin-bottom: 28px; }
        .objetivo-bloco h2 {
            color: var(--cor-principal);
            font-size: 1.15em;
            margin-bottom: 12px;
            line-height: 1.35;
        }
        .metas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .indicador-card {
            background: var(--cor-card);
            border-radius: 12px;
            box-shadow: 0 3px 10px var(--cor-sombra);
            padding: 16px;
            border-left: 5px solid var(--cor-secundaria);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .indicador-card.kr { border-left-color: var(--cor-principal); }
        .indicador-card .indicador-nome {
            font-weight: 700;
            color: var(--cor-principal);
            font-size: 0.95em;
            line-height: 1.3;
            margin-bottom: 10px;
            flex: 1;
            min-height: 2.6em;
        }
        .indicador-card .meta-numero {
            font-size: 1.1em;
            color: var(--cor-principal);
            margin-bottom: 4px;
        }
        .indicador-card .meta-numero .unidade { font-size: 0.85em; color: #666; font-weight: 400; }
        .indicador-card .alcance-texto {
            font-size: 0.85em;
            color: #555;
            margin-bottom: 6px;
        }
        .progress-bar-wrap {
            height: 10px;
            background: #e8e8e8;
            border-radius: 5px;
            overflow: hidden;
            margin: 6px 0 0 0;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--cor-secundaria);
            border-radius: 5px;
            transition: width 0.35s ease;
        }
        .indicador-card .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .indicador-card .input-row input {
            width: 90px;
            padding: 6px 10px;
            border: 1px solid var(--cor-borda);
            border-radius: 6px;
            font-size: 0.95em;
        }
        .indicador-card .input-row button {
            padding: 6px 12px;
            background: var(--cor-principal);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9em;
        }
        .indicador-card .input-row button:hover { opacity: 0.9; }
        .indicador-card .input-row button:disabled { opacity: 0.6; cursor: not-allowed; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7em;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .badge-kr { background: var(--cor-principal); color: white; }
        .badge-kpi { background: #e0e0e0; color: #555; }
        .calendario-secao { margin-top: 48px; }
        .calendario-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .calendario-card {
            background: var(--cor-card);
            border-radius: 12px;
            box-shadow: 0 4px 12px var(--cor-sombra);
            padding: 20px;
            border-left: 6px solid var(--cor-secundaria);
        }
        .calendario-card h3 { color: var(--cor-principal); margin-top: 0; margin-bottom: 12px; }
        .calendario-card ul { margin: 0; padding-left: 20px; }
        .calendario-card li { margin-bottom: 6px; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="topo">
            <img src="logo-escoladegestao.png" alt="Escola de Gestão">
            <a href="escola-gestao.html" class="voltar">← Voltar à Escola de Gestão</a>
        </div>

        <div id="visualizacao-header" class="hidden">
            <div class="header-center">
                <h1>OKR / KPI</h1>
                <p style="margin:0;">Visualização geral – apenas consulta dos resultados.</p>
            </div>
            <div style="text-align:center; display:flex; justify-content:center; gap:12px; flex-wrap:wrap;">
                <button type="button" class="btn-atualizar-dados" id="btn-atualizar-dados">Atualizar dados</button>
                <button type="button" class="btn-entrar-atualizar" id="btn-entrar-atualizar">Entrar para atualizar dados</button>
            </div>
        </div>

        <div id="login-container" class="hidden">
            <h2>OKR / KPI</h2>
            <p id="login-erro"></p>
            <label for="login-user">Usuário</label>
            <input type="text" id="login-user" autocomplete="username" placeholder="Usuário">
            <label for="login-pass">Senha</label>
            <input type="password" id="login-pass" autocomplete="current-password" placeholder="Senha">
            <button type="button" id="btn-entrar">Entrar</button>
            <p style="margin-top:16px; text-align:center;">
                <button type="button" id="btn-voltar-visualizacao" style="background:transparent; border:none; color:var(--cor-principal); font-weight:700; cursor:pointer; text-decoration:underline;">Voltar à visualização geral</button>
            </p>
        </div>

        <div id="dashboard-header" class="dashboard-header hidden">
            <div class="header-center" style="margin-bottom:0; flex:1;">
                <h1>OKR / KPI</h1>
                <p style="margin:0;">Metas do projeto e acompanhamento dos indicadores.</p>
            </div>
            <div>
                <span class="user-info" id="user-name"></span>
                <button type="button" class="btn-sair" id="btn-sair">Sair e voltar à visualização geral</button>
            </div>
        </div>

        <div id="metas-content">
            <div class="loading">Carregando metas…</div>
        </div>
        <section class="calendario-secao">
            <h2 class="secao-titulo">Calendário de coleta</h2>
            <div id="calendario-content"></div>
        </section>
    </div>

    <script>
(function () {
        // Em produção, se a API estiver em outro host, defina: window.API_BASE = 'https://sua-api.exemplo.com';
        var token = localStorage.getItem('okr_token');
        var metasData = { objetivos: [], indicadores: [] };
        var valoresData = {};
        var somenteLeitura = true;

        function getApiBase() {
            if (typeof window.API_BASE === 'string' && window.API_BASE) return window.API_BASE.replace(/\/$/, '');
            var origin = window.location.origin;
            if (origin && origin.indexOf('3001') !== -1) return origin;
            if (!origin || origin === 'null' || origin.indexOf('file://') === 0) return 'http://localhost:3001';
            return 'http://localhost:3001';
        }
        function fetchApi(path, options) {
            options = options || {};
            var url = path.indexOf('/') === 0 ? (getApiBase() + path) : (getApiBase() + '/' + path);
            var headers = options.headers || {};
            if (token) headers['Authorization'] = 'Bearer ' + token;
            if (!headers['Content-Type']) headers['Content-Type'] = 'application/json';
            return fetch(url, Object.assign({}, options, { headers: Object.assign({}, options.headers, headers) }));
        }

        function setVisible(id, show) {
            var el = document.getElementById(id);
            if (!el) return;
            el.classList.toggle('hidden', !show);
        }
        function showVisualizacaoGeral(show) {
            somenteLeitura = true;
            setVisible('visualizacao-header', show);
            setVisible('login-container', false);
            setVisible('dashboard-header', false);
            renderMetas(true);
        }
        function showLogin(show) {
            setVisible('visualizacao-header', !show);
            setVisible('login-container', show);
            setVisible('dashboard-header', false);
        }
        function showDashboard() {
            somenteLeitura = false;
            setVisible('visualizacao-header', false);
            setVisible('login-container', false);
            setVisible('dashboard-header', true);
            renderMetas(false);
        }
        function showError(msg) {
            var el = document.getElementById('login-erro');
            el.textContent = msg || '';
            el.style.display = msg ? 'block' : 'none';
        }
        function setToken(t) {
            token = t;
            if (t) localStorage.setItem('okr_token', t); else localStorage.removeItem('okr_token');
        }

        function checkAuth() {
            if (!token) {
                showVisualizacaoGeral(true);
                refreshDadosVisualizacao();
                return;
            }
            fetchApi('/api/auth/me')
                .then(function (r) {
                    if (r.ok) {
                        r.json().then(function (d) {
                            document.getElementById('user-name').textContent = (d.user && (d.user.nome || d.user.username)) || 'Usuário';
                            showDashboard();
                            loadMetas();
                            loadValores();
                        });
                    } else {
                        setToken(null);
                        showVisualizacaoGeral(true);
                        loadValores();
                    }
                })
                .catch(function () {
                    setToken(null);
                    showVisualizacaoGeral(true);
                    loadValores();
                });
        }

        function loadMetas() {
            fetchApi('/api/metas')
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    metasData = data;
                    renderMetas(somenteLeitura);
                    renderCalendario();
                })
                .catch(function () {
                    document.getElementById('metas-content').innerHTML = '<p class="loading">Erro ao carregar metas. Verifique se a API está rodando e se metas.json existe.</p>';
                });
        }
        function loadValores() {
            fetchApi('/api/valores')
                .then(function (r) {
                    if (r.status === 401) return {};
                    return r.json();
                })
                .then(function (data) {
                    valoresData = (data && data.valores) ? data.valores : {};
                    renderMetas(somenteLeitura);
                })
                .catch(function () { valoresData = {}; renderMetas(somenteLeitura); });
        }
        function refreshDadosVisualizacao() {
            var container = document.getElementById('metas-content');
            container.innerHTML = '<div class="loading">Carregando dados…</div>';
            var cacheBust = '?t=' + Date.now();
            Promise.all([
                fetchApi('/api/metas' + cacheBust).then(function (r) { return r.ok ? r.json() : null; }),
                fetchApi('/api/valores/public' + cacheBust).then(function (r) { return r.ok ? r.json() : null; })
            ]).then(function (results) {
                var metas = results[0];
                if (!metas || !metas.indicadores || !metas.indicadores.length) {
                    container.innerHTML = '<p class="loading">Erro ao carregar metas. Certifique-se de que o servidor está rodando (pasta api: <code>node server.js</code>) e que o arquivo <code>metas.json</code> existe na raiz do projeto. Abra a página em <a href="http://localhost:3001/okr-kpi.html" style="color: var(--cor-principal);">http://localhost:3001/okr-kpi.html</a>.</p>';
                    return;
                }
                metasData = metas;
                var rawValores = results[1];
                if (rawValores && rawValores.valores && typeof rawValores.valores === 'object') {
                    valoresData = rawValores.valores;
                } else if (rawValores && typeof rawValores === 'object' && !Array.isArray(rawValores) && !rawValores.error) {
                    valoresData = rawValores;
                } else {
                    valoresData = {};
                }
                somenteLeitura = true;
                renderMetas(true);
                renderCalendario();
            }).catch(function (err) {
                var msg = 'Erro ao carregar dados. ';
                if (!window.location.origin || window.location.origin === 'null' || window.location.origin.indexOf('file://') === 0) {
                    msg += 'Abra a página pelo servidor: <a href="http://localhost:3001/okr-kpi.html" style="color: var(--cor-principal);">http://localhost:3001/okr-kpi.html</a> (com o servidor rodando na pasta api: <code>node server.js</code>).';
                } else {
                    msg += 'Verifique se o servidor está rodando na pasta api (<code>node server.js</code>) e atualize a página.';
                }
                container.innerHTML = '<p class="loading">' + msg + '</p>';
            });
        }
        function saveValor(idIndicador, valor) {
            var payload = {}; payload[idIndicador] = valor === '' ? null : parseFloat(valor);
            return fetchApi('/api/valores', {
                method: 'PUT',
                body: JSON.stringify({ valores: payload })
            }).then(function (r) {
                if (!r.ok) throw new Error('Falha ao salvar');
                return r.json();
            }).then(function (d) {
                if (d.valores) valoresData = d.valores;
                renderMetas();
            });
        }

        function renderMetas(readOnly) {
            if (readOnly === undefined) readOnly = somenteLeitura;
            var container = document.getElementById('metas-content');
            var objs = metasData.objetivos || [];
            var inds = metasData.indicadores || [];
            if (!inds.length) {
                container.innerHTML = '<p class="loading">Nenhum indicador encontrado.</p>';
                return;
            }
            var html = '';
            objs.forEach(function (obj) {
                var list = inds.filter(function (i) { return i.objetivo === obj; });
                if (!list.length) return;
                html += '<div class="objetivo-bloco"><h2>' + escapeHtml(obj) + '</h2><div class="metas-grid">';
                list.forEach(function (ind) {
                    var v = valoresData[ind.id];
                    var valorAtual = v && v.valor != null ? Number(v.valor) : null;
                    var meta = ind.meta_geral != null ? Number(ind.meta_geral) : null;
                    var unidade = (ind.unidade || '').toLowerCase();
                    var isPct = unidade.indexOf('percentual') !== -1 || unidade === '%';
                    var tipoClass = (ind.tipo || '').indexOf('KR') !== -1 ? 'kr' : '';
                    var badgeClass = tipoClass ? 'badge-kr' : 'badge-kpi';
                    var badgeText = ind.tipo || 'KPI';
                    var metaStr = meta != null ? String(meta) : '–';
                    if (meta != null && isPct) metaStr += ' %';
                    var pctAlcancado = 0;
                    if (meta != null && meta > 0 && valorAtual != null) {
                        pctAlcancado = Math.min(100, (valorAtual / meta) * 100);
                    }
                    var alcanceStr = valorAtual != null ? (valorAtual + (isPct ? ' %' : '') + ' (' + pctAlcancado.toFixed(0) + '% alcançado)') : 'Nenhum valor informado';
                    var progressHtml = '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + pctAlcancado + '%"></div></div>';
                    var inputHtml = '';
                    if (!readOnly) {
                        inputHtml = '<div class="input-row">' +
                            '<input type="number" min="0" step="' + (isPct ? '0.01' : '1') + '" id="input-' + escapeAttr(ind.id) + '" placeholder="Valor" value="' + (valorAtual != null ? escapeAttr(String(valorAtual)) : '') + '">' +
                            '<button type="button" class="btn-salvar" data-id="' + escapeAttr(ind.id) + '">Salvar</button></div>';
                    } else {
                        inputHtml = '<div class="alcance-texto">' + escapeHtml(alcanceStr) + '</div>';
                    }
                    html += '<div class="indicador-card ' + tipoClass + '">' +
                        '<span class="badge ' + badgeClass + '">' + escapeHtml(badgeText) + '</span>' +
                        '<div class="indicador-nome">' + escapeHtml(ind.indicador) + '</div>' +
                        '<div class="meta-numero">Meta: ' + escapeHtml(metaStr) + (ind.unidade && !isPct ? '<span class="unidade"> ' + escapeHtml(ind.unidade) + '</span>' : '') + '</div>' +
                        inputHtml + progressHtml + '</div>';
                });
                html += '</div></div>';
            });
            container.innerHTML = html;
            if (!readOnly) {
                container.querySelectorAll('.btn-salvar').forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        var id = btn.getAttribute('data-id');
                        var input = document.getElementById('input-' + id);
                        var val = input ? input.value.trim() : '';
                        btn.disabled = true;
                        saveValor(id, val).then(function () { btn.disabled = false; }).catch(function () { btn.disabled = false; });
                    });
                });
            }
        }
        function renderCalendario() {
            var inds = metasData.indicadores || [];
            var byTemp = { Mensal: [], Bimestral: [], Semestral: [] };
            inds.forEach(function (i) {
                var t = i.temporalidade || 'Mensal';
                if (!byTemp[t]) byTemp[t] = [];
                byTemp[t].push(i);
            });
            var html = '<div class="calendario-grid">';
            ['Mensal', 'Bimestral', 'Semestral'].forEach(function (t) {
                var list = byTemp[t] || [];
                html += '<div class="calendario-card"><h3>' + t + '</h3><ul>';
                list.forEach(function (i) {
                    html += '<li>' + escapeHtml(i.indicador) + (i.quantidade_medicoes ? ' (' + i.quantidade_medicoes + ' medições)' : '') + '</li>';
                });
                html += '</ul></div>';
            });
            html += '</div>';
            document.getElementById('calendario-content').innerHTML = html;
        }
        function escapeHtml(s) {
            if (s == null) return '';
            var div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }
        function escapeAttr(s) {
            if (s == null) return '';
            return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        document.getElementById('btn-entrar').addEventListener('click', function () {
            var user = document.getElementById('login-user').value.trim();
            var pass = document.getElementById('login-pass').value;
            showError('');
            if (!user || !pass) { showError('Preencha usuário e senha.'); return; }
            fetchApi('/api/auth/login', { method: 'POST', body: JSON.stringify({ username: user, password: pass }) })
                .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
                .then(function (result) {
                    if (result.ok && result.data.token) {
                        setToken(result.data.token);
                        document.getElementById('user-name').textContent = (result.data.user && (result.data.user.nome || result.data.user.username)) || user;
                        showDashboard();
                        loadMetas();
                        loadValores();
                    } else {
                        showError(result.data && result.data.error ? result.data.error : 'Usuário ou senha inválidos.');
                    }
                })
                .catch(function () { showError('Erro de conexão. Verifique se a API está rodando.'); });
        });
        document.getElementById('btn-sair').addEventListener('click', function () {
            setToken(null);
            showVisualizacaoGeral(true);
            refreshDadosVisualizacao();
        });
        document.getElementById('btn-entrar-atualizar').addEventListener('click', function () {
            showLogin(true);
        });
        document.getElementById('btn-voltar-visualizacao').addEventListener('click', function () {
            showVisualizacaoGeral(true);
        });
        document.getElementById('btn-atualizar-dados').addEventListener('click', function () {
            refreshDadosVisualizacao();
        });

        checkAuth();
    })();
    </script>
</body>
</html>
